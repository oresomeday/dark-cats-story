<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>闇の居酒屋 - 滝下の夜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background:#000;color:#fff;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;overflow:hidden;width:100vw;height:100vh;touch-action:none}
#game-container{width:100vw;height:100vh;position:relative;overflow:hidden}
.screen{display:none;position:absolute;top:0;left:0;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
#menu-screen{background:linear-gradient(180deg,#0a0a0a 0%,#1a0a00 50%,#0a0a0a 100%)}
.game-title{font-size:clamp(28px,6vw,52px);text-align:center;color:#ff6600;text-shadow:0 0 20px rgba(255,102,0,0.5),0 0 40px rgba(255,0,0,0.3);margin-bottom:40px;letter-spacing:4px;animation:titleGlow 3s ease-in-out infinite}
.subtitle{font-size:clamp(14px,3vw,24px);color:#cc9966;letter-spacing:6px}
@keyframes titleGlow{0%,100%{text-shadow:0 0 20px rgba(255,102,0,0.5),0 0 40px rgba(255,0,0,0.3)}50%{text-shadow:0 0 30px rgba(255,102,0,0.8),0 0 60px rgba(255,0,0,0.5)}}
.menu-btn{display:block;width:220px;padding:15px 30px;margin:10px auto;font-size:20px;color:#fff;background:linear-gradient(180deg,#333 0%,#1a1a1a 100%);border:1px solid #555;border-radius:8px;cursor:pointer;transition:all 0.3s;font-family:inherit}
.menu-btn:hover{background:linear-gradient(180deg,#555 0%,#333 100%);border-color:#ff6600;box-shadow:0 0 15px rgba(255,102,0,0.3)}
.menu-btn:active{transform:scale(0.95)}
.menu-btn.small-btn{width:180px;padding:10px 20px;font-size:16px}
.menu-btn.danger{border-color:#ff3333}
.menu-btn.danger:hover{box-shadow:0 0 15px rgba(255,0,0,0.3)}
.menu-btn:disabled{opacity:0.3;cursor:not-allowed}
.chapter-btn{width:260px}
.chapter-btn.locked{opacity:0.15;pointer-events:none}
#option-screen{background:#111;padding:20px;overflow-y:auto}
#option-screen h2{margin-bottom:20px;color:#ff6600;font-size:28px}
.option-group{margin:12px 0;text-align:center;width:90%;max-width:400px}
.option-group label{display:block;margin-bottom:8px;font-size:16px;color:#ccc}
.option-group input[type="range"]{width:100%;accent-color:#ff6600}
.option-group select{width:100%;padding:8px;font-size:14px;background:#222;color:#fff;border:1px solid #555;border-radius:4px;margin-bottom:8px}
.char-voice-list{width:90%;max-width:400px;margin:10px 0}
.char-voice-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin:4px 0;background:#1a1a1a;border:1px solid #333;border-radius:6px}
.char-voice-item span{font-size:14px;color:#ccc}
.char-voice-item button{padding:6px 14px;font-size:13px;background:#333;color:#ff9933;border:1px solid #555;border-radius:4px;cursor:pointer;font-family:inherit}
.char-voice-item button:hover{background:#555;border-color:#ff6600}
#prologue-screen{background:#000}
#prologue-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#1a0a00 0%,#0d0d0d 100%)}
#char-image-container{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);width:clamp(120px,30vw,200px);height:clamp(120px,30vw,200px);z-index:2}
#char-image{width:100%;height:100%;object-fit:cover;border-radius:50%;border:3px solid #ff6600;display:none}
#char-name-box{position:absolute;bottom:170px;left:50%;transform:translateX(-50%);background:rgba(255,102,0,0.8);color:#fff;padding:4px 20px;border-radius:4px;font-size:16px;font-weight:bold;z-index:3;display:none;white-space:nowrap}
#subtitle-box{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:90%;max-width:600px;background:rgba(0,0,0,0.85);color:#fff;padding:20px 25px;border-radius:8px;font-size:clamp(16px,3.5vw,20px);line-height:1.6;text-align:center;z-index:3;border:1px solid #333;min-height:60px;display:none}
#prologue-tap-area{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:pointer}
#game-screen{background:#000;flex-direction:column}
#dark-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:1}
#game-text{position:relative;z-index:2;width:90%;max-width:500px;text-align:center;font-size:clamp(16px,3.5vw,20px);line-height:1.8;color:#ddd;padding:20px;min-height:100px;display:flex;align-items:center;justify-content:center;flex-direction:column}
#choice-display{position:relative;z-index:2;width:90%;max-width:400px;text-align:center;font-size:clamp(14px,3vw,18px);color:#ff9933;padding:10px;min-height:80px}
.choice-item{margin:5px 0;padding:5px;color:#ff9933}
.choice-item.highlight{color:#ffcc00;font-weight:bold;text-shadow:0 0 10px rgba(255,204,0,0.5)}
#flick-area{position:absolute;bottom:0;left:0;width:100%;height:100%;z-index:5}
#flick-guide{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#666;font-size:clamp(11px,2.5vw,14px);text-align:center;line-height:1.6;pointer-events:none}
#countdown-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;color:#ff0000;z-index:100;display:none;text-shadow:0 0 30px rgba(255,0,0,0.8);font-weight:bold}
.fade-in{animation:fadeIn 0.5s ease-in}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
::-webkit-scrollbar{display:none}
@media(min-width:769px){#flick-guide{color:#555}}
</style>
</head>
<body>
<div id="game-container">
  <div id="menu-screen" class="screen active">
    <h1 class="game-title">闇の居酒屋<br><span class="subtitle">― 滝下の夜 ―</span></h1>
    <div id="menu-buttons">
      <button id="start-btn" class="menu-btn">スタート</button>
      <button id="option-btn" class="menu-btn">オプション</button>
    </div>
    <div id="chapter-select" style="display:none;">
      <h2 style="text-align:center;color:#ff6600;margin-bottom:20px;">章選択</h2>
      <div id="chapter-list"></div>
      <button id="back-menu-btn" class="menu-btn small-btn" style="margin-top:20px;">戻る</button>
    </div>
  </div>
  <div id="option-screen" class="screen">
    <h2>オプション</h2>
    <div class="option-group">
      <label>音声速度: <span id="speed-val">1.0</span></label>
      <input type="range" id="speech-speed" min="0.5" max="1.2" step="0.05" value="1.0">
    </div>
    <div class="option-group">
      <label>音声選択:</label>
      <select id="voice-select"></select>
      <button id="test-voice-btn" class="menu-btn small-btn">テスト再生</button>
    </div>
    <div class="option-group"><label>キャラクター音声確認:</label></div>
    <div class="char-voice-list" id="char-voice-list"></div>
    <div class="option-group">
      <button id="clear-save-btn" class="menu-btn small-btn danger">セーブデータ削除</button>
    </div>
    <button id="option-back-btn" class="menu-btn" style="margin-top:15px;">戻る</button>
  </div>
  <div id="prologue-screen" class="screen">
    <div id="prologue-bg"></div>
    <div id="char-image-container"><img id="char-image" src="" alt=""></div>
    <div id="char-name-box"></div>
    <div id="subtitle-box"></div>
    <div id="prologue-tap-area"></div>
  </div>
  <div id="game-screen" class="screen">
    <div id="dark-overlay"></div>
    <div id="game-text"></div>
    <div id="choice-display"></div>
    <div id="flick-area"><div id="flick-guide"></div></div>
  </div>
  <div id="countdown-display"></div>
</div>

<script>
const Game={
  currentScreen:'menu',currentChapter:null,scriptIndex:0,script:[],choices:null,
  isSpeaking:false,isChoice:false,voices:[],selectedVoice:null,speechRate:1.0,
  saveData:{prologueCleared:false,chaptersCleared:[false,false,false,false,false,false,false],flags:{}},
  touchStartX:0,touchStartY:0,touchStartTime:0,longPressTimer:null,isLongPress:false,
  speakId:0,autoAdvanceTimer:null,countdownTimer:null,countdownInterval:null,
  audioCtx:null,
  isMobile:/Android|iPhone|iPad|iPod|webOS|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent),

  characters:{
    'おちぷー':{image:'ochi.png',pitch:1.2,rate:1.15,volume:1.0,
      lyingPitch:1.15,lyingRate:1.3,
      testLine:'うわっ、おれはいかないぞ。おまえがさきにいけよ。おれはしんちょうなだけだ。'},
    'ちばぶ':{image:'chiba.png',pitch:0.95,rate:0.85,volume:0.9,
      lyingPitch:0.85,lyingRate:0.75,
      testLine:'ちなみに、にんげんののうは、やく、せんよんひゃくぐらむあるらしいよ。'},
    'ゆっきん':{image:'yuuki.png',pitch:1.05,rate:1.1,volume:1.0,
      lyingPitch:1.15,lyingRate:1.2,
      testLine:'よし、かけようぜ。まけたやつが、ぜんいんぶん、おごりな。'},
    'デブコーン':{image:'debu.png',pitch:0.55,rate:0.75,volume:1.0,
      lyingPitch:0.65,lyingRate:0.85,
      testLine:'おれのとくせいりょうり、くってみろよ。たぶん、おなかはこわさない。'},
    'のぶん':{image:'nobu.png',pitch:0.85,rate:0.9,volume:0.85,
      lyingPitch:0.75,lyingRate:0.8,
      testLine:'きょう、おおものつったんだ。さしみにしたら、さいこうだぜ。'},
    'よっちん':{image:'yochi.png',pitch:1.1,rate:1.0,volume:0.95,
      lyingPitch:1.2,lyingRate:1.15,
      testLine:'しんじてくれよ。おれは、ともだちをだますようなやつじゃない。'},
    'かとぱん':{image:'kato.png',pitch:0.75,rate:0.95,volume:0.9,
      lyingPitch:0.85,lyingRate:1.05,
      testLine:'いしゃとして、いっておく。のみすぎは、からだにわるいぞ。'},
    'エディマーシー':{image:'masahiro.png',pitch:0.5,rate:0.7,volume:1.0,
      lyingPitch:0.6,lyingRate:0.8,
      testLine:'おれは、うんてんせんもんだ。くるまのそとは、よくわからん。'},
    'ナレーション':{image:null,pitch:0.9,rate:0.9,volume:1.0,
      lyingPitch:0.9,lyingRate:0.9,
      testLine:'やみのなかで、ものがたりがはじまる。'}
  },

  init(){
    this.loadSave();this.initVoices();this.bindEvents();this.showScreen('menu');this.updateChapterList();
    try{this.audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  },

  initVoices(){
    const load=()=>{this.voices=speechSynthesis.getVoices();this.populateVoiceSelect();this.buildCharVoiceList();};
    speechSynthesis.onvoiceschanged=load;setTimeout(load,100);load();
  },

  getHighQualityVoice(){
    const v=speechSynthesis.getVoices();
    const tests=[vo=>vo.lang.startsWith('ja')&&vo.name.includes('Google'),vo=>vo.lang.startsWith('ja')&&vo.name.includes('Premium'),vo=>vo.lang.startsWith('ja')&&vo.name.includes('Enhanced'),vo=>vo.lang.startsWith('ja')&&!vo.localService,vo=>vo.lang.startsWith('ja')];
    for(const t of tests){const f=v.find(t);if(f)return f;}return v[0]||null;
  },

  populateVoiceSelect(){
    const sel=document.getElementById('voice-select');sel.innerHTML='';
    const ja=this.voices.filter(v=>v.lang.startsWith('ja'));
    const list=ja.length>0?ja:this.voices;
    list.forEach(v=>{const o=document.createElement('option');o.value=this.voices.indexOf(v);o.textContent=`${v.name} (${v.lang})`;sel.appendChild(o);});
    const best=this.getHighQualityVoice();
    if(best){this.selectedVoice=best;sel.value=this.voices.indexOf(best);}
  },

  buildCharVoiceList(){
    const list=document.getElementById('char-voice-list');list.innerHTML='';
    Object.keys(this.characters).forEach(name=>{
      const item=document.createElement('div');item.className='char-voice-item';
      const span=document.createElement('span');span.textContent=name;
      const btn=document.createElement('button');btn.textContent='▶ 再生';
      btn.addEventListener('click',()=>{
        speechSynthesis.cancel();const cd=this.characters[name];
        const u=new SpeechSynthesisUtterance(cd.testLine);
        if(this.selectedVoice)u.voice=this.selectedVoice;
        u.pitch=Math.min(cd.pitch,1.2);u.rate=cd.rate*this.speechRate;u.volume=cd.volume||1.0;u.lang='ja-JP';
        speechSynthesis.speak(u);
      });
      item.appendChild(span);item.appendChild(btn);list.appendChild(item);
    });
  },

  // ===== 音声再生 =====
  speak(text,character,callback,options={}){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);
    this.speakId++;const myId=this.speakId;
    const cd=this.characters[character]||this.characters['ナレーション'];
    const lying=options.lying||false;
    const pan=options.pan||0; // -1左 0中央 1右
    const sentences=text.split(/(?<=[。])/g).filter(s=>s.trim());
    let si=0;this.isSpeaking=true;

    const finish=()=>{if(myId!==this.speakId)return;this.isSpeaking=false;if(callback)callback();};

    const speakNext=()=>{
      if(myId!==this.speakId)return;
      if(si>=sentences.length){finish();return;}
      let s=sentences[si];
      let clean=s.replace(/[「」『』【】（）()！？!?…―─・\.,;:""''～〜♪★☆◆◇■□▲△▽▼※→←↑↓]/g,'');
      clean=clean.replace(/方/g,'ほう').replace(/上/g,'うえ').replace(/下/g,'した');
      clean=clean.replace(/[。、]/g,' ').trim();
      if(!clean){si++;speakNext();return;}

      const u=new SpeechSynthesisUtterance(clean);
      if(this.selectedVoice)u.voice=this.selectedVoice;
      u.pitch=Math.min(lying?cd.lyingPitch:cd.pitch,1.2);
      u.rate=(lying?cd.lyingRate:cd.rate)*this.speechRate;
      u.volume=cd.volume||1.0;
      u.lang='ja-JP';

      u.onend=()=>{if(myId!==this.speakId)return;si++;const d=s.includes('。')?400:150;this.autoAdvanceTimer=setTimeout(speakNext,d);};
      u.onerror=()=>{if(myId!==this.speakId)return;si++;this.autoAdvanceTimer=setTimeout(speakNext,100);};
      speechSynthesis.speak(u);
    };
    speakNext();
  },

  // 左右パン音声
  speakPanned(text,character,panDir,callback){
    this.speak(text,character,callback,{pan:panDir});
  },

  skipCurrentSpeech(){
    if(!this.isSpeaking)return;if(this.isChoice)return;
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);
    this.speakId++;this.isSpeaking=false;
  },

  // ===== 沈黙の間 =====
  silence(ms,callback){
    this.speakId++;const myId=this.speakId;this.isSpeaking=true;
    this.autoAdvanceTimer=setTimeout(()=>{if(myId!==this.speakId)return;this.isSpeaking=false;if(callback)callback();},ms);
  },

  // ===== カウントダウン =====
  startCountdown(seconds,onTimeout){
    const cdEl=document.getElementById('countdown-display');
    cdEl.style.display='block';
    let remaining=seconds;cdEl.textContent=remaining;
    this.speak(`${remaining}びょうで、せんたくしてください。`,'ナレーション',()=>{},{});
    this.countdownInterval=setInterval(()=>{
      remaining--;
      if(remaining>0){cdEl.textContent=remaining;}
      else{
        cdEl.textContent='0';clearInterval(this.countdownInterval);
        setTimeout(()=>{cdEl.style.display='none';},500);
        if(this.isChoice){this.isChoice=false;this.choices=null;
          document.getElementById('choice-display').innerHTML='';
          if(onTimeout)onTimeout();
        }
      }
    },1000);
  },

  stopCountdown(){
    clearInterval(this.countdownInterval);this.countdownInterval=null;
    document.getElementById('countdown-display').style.display='none';
  },

  // ===== ゲームオーバー =====
  gameOver(){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;
    const te=document.getElementById('game-text');
    const ce=document.getElementById('choice-display');
    ce.innerHTML='';
    te.innerHTML='<span style="color:#ff0000;font-size:1.3em;">GAME OVER</span>';

    this.silence(3000,()=>{
      this.speak('あなたは、やみに、のまれた。','ナレーション',()=>{
        this.silence(2000,()=>{
          this.speak('げーむおーばー。このしょうの、はじめから、やりなおします。','ナレーション',()=>{
            this.silence(2000,()=>{
              this.restartChapter();
            });
          },{});
        });
      },{});
    });
  },

  restartChapter(){
    if(this.currentChapter)this.startChapter(this.currentChapter);
  },

  // ===== セーブ/ロード =====
  save(){localStorage.setItem('darkMysteryGame',JSON.stringify(this.saveData));},
  loadSave(){const d=localStorage.getItem('darkMysteryGame');if(d)this.saveData=JSON.parse(d);},
  clearSave(){
    this.saveData={prologueCleared:false,chaptersCleared:[false,false,false,false,false,false,false],flags:{}};
    localStorage.removeItem('darkMysteryGame');this.updateChapterList();
  },

  showScreen(name){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const map={'menu':'menu-screen','option':'option-screen','prologue':'prologue-screen','game':'game-screen'};
    const el=document.getElementById(map[name]);
    if(el){el.classList.add('active');el.classList.add('fade-in');}
    this.currentScreen=name;
  },

  updateChapterList(){
    const list=document.getElementById('chapter-list');list.innerHTML='';
    const names=['第一章：暗闇の始まり','第二章：疑惑の声','第三章：消えた記憶','第四章：裏切りの味','第五章：賭けの代償','第六章：真実の糸','第七章：闇の終焉'];
    names.forEach((n,i)=>{
      const btn=document.createElement('button');btn.className='menu-btn chapter-btn';btn.textContent=n;
      if(i===0){if(!this.saveData.prologueCleared){btn.classList.add('locked');btn.style.display='none';}}
      else{if(!this.saveData.chaptersCleared[i-1]){btn.classList.add('locked');btn.style.display='none';}}
      if(this.saveData.chaptersCleared[i])btn.style.borderColor='#00cc66';
      btn.addEventListener('click',()=>this.startChapter(i+1));list.appendChild(btn);
    });
  },

  showChapterSelect(){document.getElementById('menu-buttons').style.display='none';document.getElementById('chapter-select').style.display='block';this.updateChapterList();},
  hideChapterSelect(){document.getElementById('menu-buttons').style.display='block';document.getElementById('chapter-select').style.display='none';},

  // ===== プロローグ =====
  startPrologue(){this.showScreen('prologue');this.script=typeof PrologueScript!=='undefined'?PrologueScript:[];this.scriptIndex=0;this.runPrologueItem();},

  runPrologueItem(){
    if(this.scriptIndex>=this.script.length){this.endPrologue();return;}
    const item=this.script[this.scriptIndex];
    const ci=document.getElementById('char-image');const cn=document.getElementById('char-name-box');const sb=document.getElementById('subtitle-box');
    if(item.character==='ナレーション'){ci.style.display='none';cn.style.display='none';}
    else{const c=this.characters[item.character];if(c&&c.image){ci.src=c.image;ci.style.display='block';ci.onerror=()=>{ci.style.display='none';};}else ci.style.display='none';cn.textContent=item.character;cn.style.display='block';}
    sb.textContent=item.displayText||item.text;sb.style.display='block';
    this.speak(item.text,item.character,()=>{this.autoAdvanceTimer=setTimeout(()=>{this.scriptIndex++;this.runPrologueItem();},600);},{});
  },

  tapPrologue(){if(this.isSpeaking){this.skipCurrentSpeech();this.scriptIndex++;this.runPrologueItem();}},

  endPrologue(){
    this.saveData.prologueCleared=true;this.save();speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.speakId++;
    document.getElementById('char-image').style.display='none';document.getElementById('char-name-box').style.display='none';document.getElementById('subtitle-box').style.display='none';
    this.showScreen('menu');this.showChapterSelect();
  },

  // ===== チャプター =====
  startChapter(num){
    this.currentChapter=num;
    const scripts={1:typeof Chapter1Script!=='undefined'?Chapter1Script:[],2:typeof Chapter2Script!=='undefined'?Chapter2Script:[],3:typeof Chapter3Script!=='undefined'?Chapter3Script:[],4:typeof Chapter4Script!=='undefined'?Chapter4Script:[],5:typeof Chapter5Script!=='undefined'?Chapter5Script:[],6:typeof Chapter6Script!=='undefined'?Chapter6Script:[],7:typeof Chapter7Script!=='undefined'?Chapter7Script:[]};
    this.script=scripts[num]||[];this.scriptIndex=0;this.showScreen('game');this.updateFlickGuide();this.runGameItem();
  },

  updateFlickGuide(){
    const g=document.getElementById('flick-guide');
    if(this.isMobile)g.innerHTML='タップ：スキップ ｜ フリック：選択肢<br>長押し：メニューに戻る';
    else g.innerHTML='クリック/Enter：スキップ ｜ 矢印キー：選択肢<br>Escキー：メニューに戻る';
  },

  runGameItem(){
    if(this.scriptIndex>=this.script.length){this.endChapter();return;}
    const item=this.script[this.scriptIndex];
    const te=document.getElementById('game-text');const ce=document.getElementById('choice-display');

    if(item.type==='text'){
      ce.innerHTML='';this.isChoice=false;te.innerHTML='';
      if(item.character&&item.character!=='ナレーション')te.innerHTML=`<span style="color:#ff9933;font-size:0.85em;">${item.character}</span><br>${item.displayText||item.text}`;
      else te.innerHTML=item.displayText||item.text;
      const opts={};if(item.lying)opts.lying=true;if(item.pan!==undefined)opts.pan=item.pan;
      this.speak(item.text,item.character||'ナレーション',()=>{this.autoAdvanceTimer=setTimeout(()=>{this.scriptIndex++;this.save();this.runGameItem();},500);},opts);

    }else if(item.type==='silence'){
      ce.innerHTML='';this.isChoice=false;
      if(item.displayText)te.innerHTML=item.displayText;
      this.silence(item.duration||2000,()=>{this.scriptIndex++;this.save();this.runGameItem();});

    }else if(item.type==='choice'){
      this.isChoice=true;this.choices=item.choices;
      te.innerHTML=item.displayText||item.text||'選択してください';
      let html='';const n=item.choices.length;
      const dirs=n===2?['↑ うえ','↓ した']:['↑ うえ','↓ した','← ひだり','→ みぎ'];
      item.choices.forEach((c,i)=>{html+=`<div class="choice-item" id="choice-${i}">${dirs[i]}：${c.displayText||c.text}</div>`;});
      ce.innerHTML=html;
      let rd='せんたくしてください。';
      const dn=n===2?['うえ','した']:['うえ','した','ひだり','みぎ'];
      item.choices.forEach((c,i)=>{rd+=`${dn[i]}、${c.text}。`;});

      if(item.countdown){
        this.speak(rd,'ナレーション',()=>{
          this.startCountdown(item.countdown,()=>{
            if(item.timeoutJump){const idx=this.script.findIndex(s=>s.label===item.timeoutJump);this.scriptIndex=idx>=0?idx:this.scriptIndex+1;this.runGameItem();}
            else this.gameOver();
          });
        },{});
      }else{
        this.speak(rd,'ナレーション',()=>{},{});
      }

    }else if(item.type==='gameover'){
      this.gameOver();return;

    }else if(item.type==='jump'){
      const idx=this.script.findIndex(s=>s.label===item.target);
      this.scriptIndex=idx>=0?idx:this.scriptIndex+1;this.runGameItem();return;

    }else if(item.type==='flag'){
      this.saveData.flags[item.key]=item.value;this.save();this.scriptIndex++;this.runGameItem();return;

    }else if(item.type==='checkflag'){
      const val=this.saveData.flags[item.key];
      if(val===item.value){const idx=this.script.findIndex(s=>s.label===item.target);this.scriptIndex=idx>=0?idx:this.scriptIndex+1;}
      else{if(item.elseTarget){const idx=this.script.findIndex(s=>s.label===item.elseTarget);this.scriptIndex=idx>=0?idx:this.scriptIndex+1;}else this.scriptIndex++;}
      this.runGameItem();return;

    }else if(item.type==='end'){
      this.endChapter();return;
    }else{this.scriptIndex++;this.runGameItem();return;}
  },

  tapGame(){if(this.isChoice)return;if(this.isSpeaking){this.skipCurrentSpeech();this.scriptIndex++;this.save();this.runGameItem();}},

  handleChoiceInput(dir){
    if(!this.isChoice||!this.choices)return;
    const n=this.choices.length;let ci=-1;
    if(n===2){if(dir==='up')ci=0;else if(dir==='down')ci=1;}
    else if(n===4){if(dir==='up')ci=0;else if(dir==='down')ci=1;else if(dir==='left')ci=2;else if(dir==='right')ci=3;}
    else if(n===3){if(dir==='up')ci=0;else if(dir==='down')ci=1;else if(dir==='left')ci=2;}
    if(ci<0||ci>=n)return;
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;
    document.querySelectorAll('.choice-item').forEach(el=>el.classList.remove('highlight'));
    const el=document.getElementById(`choice-${ci}`);if(el)el.classList.add('highlight');
    const chosen=this.choices[ci];
    setTimeout(()=>{
      document.getElementById('choice-display').innerHTML='';
      if(chosen.jump){const idx=this.script.findIndex(s=>s.label===chosen.jump);this.scriptIndex=idx>=0?idx:this.scriptIndex+1;}
      else this.scriptIndex++;
      this.save();this.runGameItem();
    },300);
  },

  endChapter(){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();this.speakId++;this.isSpeaking=false;
    if(this.currentChapter){this.saveData.chaptersCleared[this.currentChapter-1]=true;this.save();}
    this.showScreen('menu');this.showChapterSelect();
  },

  returnToMenu(){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();this.speakId++;this.isSpeaking=false;this.isChoice=false;
    this.showScreen('menu');if(this.saveData.prologueCleared)this.showChapterSelect();else this.hideChapterSelect();
  },

  bindEvents(){
    document.getElementById('start-btn').addEventListener('click',()=>{if(this.saveData.prologueCleared)this.showChapterSelect();else this.startPrologue();});
    document.getElementById('option-btn').addEventListener('click',()=>this.showScreen('option'));
    document.getElementById('option-back-btn').addEventListener('click',()=>{speechSynthesis.cancel();this.showScreen('menu');if(this.saveData.prologueCleared)this.showChapterSelect();});
    document.getElementById('back-menu-btn').addEventListener('click',()=>this.hideChapterSelect());
    document.getElementById('speech-speed').addEventListener('input',e=>{this.speechRate=parseFloat(e.target.value);document.getElementById('speed-val').textContent=this.speechRate.toFixed(2);});
    document.getElementById('voice-select').addEventListener('change',e=>{this.selectedVoice=this.voices[parseInt(e.target.value)];});
    document.getElementById('test-voice-btn').addEventListener('click',()=>{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance('これはテスト音声です。闇の居酒屋へようこそ。');if(this.selectedVoice)u.voice=this.selectedVoice;u.pitch=0.9;u.rate=this.speechRate;u.lang='ja-JP';speechSynthesis.speak(u);});
    document.getElementById('clear-save-btn').addEventListener('click',()=>{if(confirm('セーブデータを削除しますか？')){this.clearSave();alert('削除しました。');}});
    document.getElementById('prologue-tap-area').addEventListener('click',()=>{if(this.currentScreen==='prologue')this.tapPrologue();});

    const fa=document.getElementById('flick-area');
    fa.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];this.touchStartX=t.clientX;this.touchStartY=t.clientY;this.touchStartTime=Date.now();this.isLongPress=false;this.longPressTimer=setTimeout(()=>{this.isLongPress=true;this.returnToMenu();},1000);},{passive:false});
    fa.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];const dx=t.clientX-this.touchStartX,dy=t.clientY-this.touchStartY;if(Math.sqrt(dx*dx+dy*dy)>20)clearTimeout(this.longPressTimer);},{passive:false});
    fa.addEventListener('touchend',e=>{e.preventDefault();clearTimeout(this.longPressTimer);if(this.isLongPress)return;if(this.currentScreen!=='game')return;const t=e.changedTouches[0];const dx=t.clientX-this.touchStartX,dy=t.clientY-this.touchStartY;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>40){if(Math.abs(dx)>Math.abs(dy))this.handleChoiceInput(dx>0?'right':'left');else this.handleChoiceInput(dy>0?'down':'up');}else this.tapGame();},{passive:false});
    fa.addEventListener('click',e=>{if(this.currentScreen!=='game'||this.isMobile)return;this.tapGame();});
    document.addEventListener('keydown',e=>{
      if(this.currentScreen==='game'){switch(e.key){case'ArrowUp':this.handleChoiceInput('up');break;case'ArrowDown':this.handleChoiceInput('down');break;case'ArrowLeft':this.handleChoiceInput('left');break;case'ArrowRight':this.handleChoiceInput('right');break;case' ':case'Enter':this.tapGame();break;case'Escape':this.returnToMenu();break;}}
      else if(this.currentScreen==='prologue'){if(e.key===' '||e.key==='Enter')this.tapPrologue();}
    });
  }
};
window.addEventListener('DOMContentLoaded',()=>Game.init());
</script>
