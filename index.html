<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>й—ҮгҒ®еұ…й…’еұӢ - ж»қдёӢгҒ®еӨң</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background:#000;color:#fff;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;overflow:hidden;width:100vw;height:100vh}
#game-container{width:100vw;height:100vh;position:relative;overflow:hidden}
.screen{display:none;position:absolute;top:0;left:0;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
#menu-screen{background:linear-gradient(180deg,#0a0a0a 0%,#1a0a00 50%,#0a0a0a 100%);z-index:10}
.game-title{font-size:clamp(28px,6vw,52px);text-align:center;color:#ff6600;text-shadow:0 0 20px rgba(255,102,0,0.5),0 0 40px rgba(255,0,0,0.3);margin-bottom:40px;letter-spacing:4px;animation:titleGlow 3s ease-in-out infinite}
.subtitle{font-size:clamp(14px,3vw,24px);color:#cc9966;letter-spacing:6px}
@keyframes titleGlow{0%,100%{text-shadow:0 0 20px rgba(255,102,0,0.5),0 0 40px rgba(255,0,0,0.3)}50%{text-shadow:0 0 30px rgba(255,102,0,0.8),0 0 60px rgba(255,0,0,0.5)}}
.menu-btn{display:block;width:220px;padding:15px 30px;margin:10px auto;font-size:20px;color:#fff;background:linear-gradient(180deg,#333 0%,#1a1a1a 100%);border:1px solid #555;border-radius:8px;cursor:pointer;transition:all 0.3s;font-family:inherit}
.menu-btn:hover{background:linear-gradient(180deg,#555 0%,#333 100%);border-color:#ff6600;box-shadow:0 0 15px rgba(255,102,0,0.3)}
.menu-btn:active{transform:scale(0.95)}
.menu-btn.small-btn{width:180px;padding:10px 20px;font-size:16px}
.menu-btn.danger{border-color:#ff3333}
.menu-btn.danger:hover{box-shadow:0 0 15px rgba(255,0,0,0.3)}
.menu-btn:disabled{opacity:0.3;cursor:not-allowed}
.chapter-btn{width:260px}
.chapter-btn.locked{opacity:0.15;pointer-events:none}
#option-screen{background:#111;padding:20px;z-index:10;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
#option-screen h2{margin-bottom:20px;color:#ff6600;font-size:28px}
.option-group{margin:12px 0;text-align:center;width:90%;max-width:400px}
.option-group label{display:block;margin-bottom:8px;font-size:16px;color:#ccc}
.option-group input[type="range"]{width:100%;accent-color:#ff6600;touch-action:pan-x}
.char-voice-list{width:90%;max-width:400px;margin:10px 0}
.char-voice-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin:4px 0;background:#1a1a1a;border:1px solid #333;border-radius:6px}
.char-voice-item span{font-size:14px;color:#ccc}
.char-voice-item button{padding:6px 14px;font-size:13px;background:#333;color:#ff9933;border:1px solid #555;border-radius:4px;cursor:pointer;font-family:inherit}
.char-voice-item button:hover{background:#555;border-color:#ff6600}
#prologue-screen{background:#000;z-index:10}
#prologue-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#1a0a00 0%,#0d0d0d 100%)}
#char-image-container{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);width:clamp(120px,30vw,200px);height:clamp(120px,30vw,200px);z-index:2}
#char-image{width:100%;height:100%;object-fit:cover;border-radius:50%;border:3px solid #ff6600;display:none}
#char-name-box{position:absolute;bottom:170px;left:50%;transform:translateX(-50%);background:rgba(255,102,0,0.8);color:#fff;padding:4px 20px;border-radius:4px;font-size:16px;font-weight:bold;z-index:3;display:none;white-space:nowrap}
#subtitle-box{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:90%;max-width:600px;background:rgba(0,0,0,0.85);color:#fff;padding:20px 25px;border-radius:8px;font-size:clamp(16px,3.5vw,20px);line-height:1.6;text-align:center;z-index:3;border:1px solid #333;min-height:60px;display:none}
#prologue-tap-area{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:pointer}
#game-screen{background:#000;flex-direction:column}
#dark-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:1}
#game-text{position:relative;z-index:2;width:90%;max-width:500px;text-align:center;font-size:clamp(16px,3.5vw,20px);line-height:1.8;color:#ddd;padding:20px;min-height:100px;display:flex;align-items:center;justify-content:center;flex-direction:column}
#choice-display{position:relative;z-index:2;width:90%;max-width:400px;text-align:center;font-size:clamp(14px,3vw,18px);color:#ff9933;padding:10px;min-height:80px}
.choice-item{margin:5px 0;padding:5px;color:#ff9933}
.choice-item.highlight{color:#ffcc00;font-weight:bold;text-shadow:0 0 10px rgba(255,204,0,0.5)}
#flick-area{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;display:none}
#flick-guide{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#666;font-size:clamp(11px,2.5vw,14px);text-align:center;line-height:1.6;pointer-events:none}
#countdown-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;color:#ff0000;z-index:100;display:none;text-shadow:0 0 30px rgba(255,0,0,0.8);font-weight:bold}
.fade-in{animation:fadeIn 0.5s ease-in}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
::-webkit-scrollbar{display:none}
@media(min-width:769px){#flick-guide{color:#555}}
</style>
</head>
<body>
<div id="game-container">
  <div id="menu-screen" class="screen active">
    <h1 class="game-title">й—ҮгҒ®еұ…й…’еұӢ<br><span class="subtitle">вҖ• ж»қдёӢгҒ®еӨң вҖ•</span></h1>
    <div id="menu-buttons">
      <button id="start-btn" class="menu-btn">гӮ№гӮҝгғјгғҲ</button>
      <button id="option-btn" class="menu-btn">гӮӘгғ—гӮ·гғ§гғі</button>
    </div>
    <div id="chapter-select" style="display:none;">
      <h2 style="text-align:center;color:#ff6600;margin-bottom:20px;">з« йҒёжҠһ</h2>
      <div id="chapter-list"></div>
      <button id="back-menu-btn" class="menu-btn small-btn" style="margin-top:20px;">жҲ»гӮӢ</button>
    </div>
  </div>
  <div id="option-screen" class="screen">
    <h2>гӮӘгғ—гӮ·гғ§гғі</h2>
    <div class="option-group">
      <label>йҹіеЈ°йҖҹеәҰ: <span id="speed-val">1.00</span>еҖҚ</label>
      <input type="range" id="speech-speed" min="0.5" max="1.2" step="0.05" value="1.0">
    </div>
    <div class="option-group">
      <button id="test-voice-btn" class="menu-btn small-btn">гғҶгӮ№гғҲеҶҚз”ҹ</button>
    </div>
    <div class="option-group"><label>гӮӯгғЈгғ©гӮҜгӮҝгғјйҹіеЈ°зўәиӘҚ:</label></div>
    <div class="char-voice-list" id="char-voice-list"></div>
    <div class="option-group">
      <button id="clear-save-btn" class="menu-btn small-btn danger">гӮ»гғјгғ–гғҮгғјгӮҝеүҠйҷӨ</button>
    </div>
    <button id="option-back-btn" class="menu-btn" style="margin-top:15px;">жҲ»гӮӢ</button>
  </div>
  <div id="prologue-screen" class="screen">
    <div id="prologue-bg"></div>
    <div id="char-image-container"><img id="char-image" src="" alt=""></div>
    <div id="char-name-box"></div>
    <div id="subtitle-box"></div>
    <div id="prologue-tap-area"></div>
  </div>
  <div id="game-screen" class="screen">
    <div id="dark-overlay"></div>
    <div id="game-text"></div>
    <div id="choice-display"></div>
    <div id="flick-area"><div id="flick-guide"></div></div>
  </div>
  <div id="countdown-display"></div>
</div>

<script>
const Game={
  currentScreen:'menu',
  currentChapter:null,
  scriptIndex:0,
  script:[],
  choices:null,
  isSpeaking:false,
  isChoice:false,
  voices:[],
  selectedVoice:null,
  speechRate:1.0,
  totalChapters:7,
  saveData:{
    prologueCleared:false,
    chaptersCleared:[],
    currentChapter:null,
    currentIndex:0,
    flags:{}
  },
  touchStartX:0,
  touchStartY:0,
  touchStartTime:0,
  longPressTimer:null,
  isLongPress:false,
  speakId:0,
  autoAdvanceTimer:null,
  countdownInterval:null,
  isMobile:/Android|iPhone|iPad|iPod|webOS|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent),
  skipCooldown:false,

  characters:{
    'гҒҠгҒЎгҒ·гғј':{image:'ochi.png',pitch:1.2,rate:1.15,volume:1.0,
      lyingPitch:1.15,lyingRate:1.3,
      testLine:'гҒҶгӮҸгҒЈгҖҒгҒҠгӮҢгҒҜгҒ„гҒӢгҒӘгҒ„гҒһгҖӮгҒҠгҒҫгҒҲгҒҢгҒ•гҒҚгҒ«гҒ„гҒ‘гӮҲгҖӮ'},
    'гҒЎгҒ°гҒ¶':{image:'chiba.png',pitch:0.95,rate:0.85,volume:0.9,
      lyingPitch:0.85,lyingRate:0.75,
      testLine:'гҒ«гӮ“гҒ’гӮ“гҒ®гҒ®гҒҶгҒҜгӮ„гҒҸгҒӣгӮ“гӮҲгӮ“гҒІгӮғгҒҸгҒҗгӮүгӮҖгҒӮгӮӢгӮүгҒ—гҒ„гӮҲгҖӮ'},
    'гӮҶгҒЈгҒҚгӮ“':{image:'yuuki.png',pitch:1.05,rate:1.1,volume:1.0,
      lyingPitch:1.15,lyingRate:1.2,
      testLine:'гӮҲгҒ—гҒӢгҒ‘гӮҲгҒҶгҒңгҖӮгҒҫгҒ‘гҒҹгӮ„гҒӨгҒҢгҒңгӮ“гҒ„гӮ“гҒ¶гӮ“гҒҠгҒ”гӮҠгҒӘгҖӮ'},
    'гғҮгғ–гӮігғјгғі':{image:'debu.png',pitch:0.55,rate:0.75,volume:1.0,
      lyingPitch:0.65,lyingRate:0.85,
      testLine:'гҒҠгӮҢгҒ®гҒЁгҒҸгҒӣгҒ„гӮҠгӮҮгҒҶгӮҠгҒҸгҒЈгҒҰгҒҝгӮҚгӮҲгҖӮгҒҹгҒ¶гӮ“гҒҠгҒӘгҒӢгҒҜгҒ“гӮҸгҒ•гҒӘгҒ„гҖӮ'},
    'гҒ®гҒ¶гӮ“':{image:'nobu.png',pitch:0.85,rate:0.9,volume:0.85,
      lyingPitch:0.75,lyingRate:0.8,
      testLine:'гҒҚгӮҮгҒҶгҒҠгҒҠгӮӮгҒ®гҒӨгҒЈгҒҹгӮ“гҒ гҖӮгҒ•гҒ—гҒҝгҒ«гҒ—гҒҹгӮүгҒ•гҒ„гҒ“гҒҶгҒ гҒңгҖӮ'},
    'гӮҲгҒЈгҒЎгӮ“':{image:'yochi.png',pitch:1.1,rate:1.0,volume:0.95,
      lyingPitch:1.2,lyingRate:1.15,
      testLine:'гҒ—гӮ“гҒҳгҒҰгҒҸгӮҢгӮҲгҖӮгҒҠгӮҢгҒҜгҒЁгӮӮгҒ гҒЎгӮ’гҒ гҒҫгҒҷгӮҲгҒҶгҒӘгӮ„гҒӨгҒҳгӮғгҒӘгҒ„гҖӮ'},
    'гҒӢгҒЁгҒұгӮ“':{image:'kato.png',pitch:0.75,rate:0.95,volume:0.9,
      lyingPitch:0.85,lyingRate:1.05,
      testLine:'гҒ„гҒ—гӮғгҒЁгҒ—гҒҰгҒ„гҒЈгҒҰгҒҠгҒҸгҖӮгҒ®гҒҝгҒҷгҒҺгҒҜгҒӢгӮүгҒ гҒ«гӮҸгӮӢгҒ„гҒһгҖӮ'},
    'гӮЁгғҮгӮЈгғһгғјгӮ·гғј':{image:'masahiro.png',pitch:0.5,rate:0.7,volume:1.0,
      lyingPitch:0.6,lyingRate:0.8,
      testLine:'гҒҠгӮҢгҒҜгҒҶгӮ“гҒҰгӮ“гҒӣгӮ“гӮӮгӮ“гҒ гҖӮгҒҸгӮӢгҒҫгҒ®гҒқгҒЁгҒҜгӮҲгҒҸгӮҸгҒӢгӮүгӮ“гҖӮ'},
    'гғҠгғ¬гғјгӮ·гғ§гғі':{image:null,pitch:0.9,rate:0.9,volume:1.0,
      lyingPitch:0.9,lyingRate:0.9,
      testLine:'гӮ„гҒҝгҒ®гҒӘгҒӢгҒ§гӮӮгҒ®гҒҢгҒҹгӮҠгҒҢгҒҜгҒҳгҒҫгӮӢгҖӮ'}
  },

  getChapterScript(num){
    const map={
      1:typeof Chapter1Script!=='undefined'?Chapter1Script:null,
      2:typeof Chapter2Script!=='undefined'?Chapter2Script:null,
      3:typeof Chapter3Script!=='undefined'?Chapter3Script:null,
      4:typeof Chapter4Script!=='undefined'?Chapter4Script:null,
      5:typeof Chapter5Script!=='undefined'?Chapter5Script:null,
      6:typeof Chapter6Script!=='undefined'?Chapter6Script:null,
      7:typeof Chapter7Script!=='undefined'?Chapter7Script:null
    };
    return map[num]||null;
  },

  getChapterTitle(num){
    const s=this.getChapterScript(num);
    if(s&&s.chapterTitle)return s.chapterTitle;
    return 'з¬¬'+num+'з« ';
  },

  detectTotalChapters(){
    let count=0;
    for(let i=1;i<=20;i++){
      if(this.getChapterScript(i))count=i;else break;
    }
    this.totalChapters=Math.max(count,1);
  },

  init(){
    this.detectTotalChapters();
    this.loadSave();
    this.initVoices();
    this.bindEvents();
    this.showScreen('menu');
    if(this.saveData.prologueCleared)this.showChapterSelect();
  },

  initVoices(){
    const load=()=>{
      this.voices=speechSynthesis.getVoices();
      this.selectedVoice=this.getHighQualityVoice();
      this.buildCharVoiceList();
    };
    speechSynthesis.onvoiceschanged=load;
    setTimeout(load,100);
    setTimeout(load,500);
    setTimeout(load,1000);
    load();
  },

  getHighQualityVoice(){
    const v=speechSynthesis.getVoices();
    const tests=[
      vo=>vo.lang.startsWith('ja')&&vo.name.includes('Google'),
      vo=>vo.lang.startsWith('ja')&&vo.name.includes('Premium'),
      vo=>vo.lang.startsWith('ja')&&vo.name.includes('Enhanced'),
      vo=>vo.lang.startsWith('ja')&&!vo.localService,
      vo=>vo.lang.startsWith('ja')
    ];
    for(const t of tests){const f=v.find(t);if(f)return f;}
    return v[0]||null;
  },

  buildCharVoiceList(){
    const list=document.getElementById('char-voice-list');
    list.innerHTML='';
    Object.keys(this.characters).forEach(name=>{
      const item=document.createElement('div');
      item.className='char-voice-item';
      const span=document.createElement('span');
      span.textContent=name;
      const btn=document.createElement('button');
      btn.textContent='в–¶ еҶҚз”ҹ';
      btn.addEventListener('click',()=>{
        speechSynthesis.cancel();
        const cd=this.characters[name];
        const u=new SpeechSynthesisUtterance(cd.testLine);
        if(this.selectedVoice)u.voice=this.selectedVoice;
        u.pitch=Math.min(cd.pitch,1.2);
        u.rate=cd.rate*this.speechRate;
        u.volume=cd.volume||1.0;
        u.lang='ja-JP';
        speechSynthesis.speak(u);
      });
      item.appendChild(span);
      item.appendChild(btn);
      list.appendChild(item);
    });
  },

  convertReadText(text){
    let r=text;
    r=r.replace(/[гҖҢгҖҚгҖҺгҖҸгҖҗгҖ‘пјҲпјү()пјҒпјҹ!?вҖҰвҖ•в”Җгғ»\.,;:""''пҪһгҖңвҷӘвҳ…вҳҶв—Ҷв—Үв– в–Ўв–Ів–ів–Ҫв–јвҖ»вҶ’вҶҗвҶ‘вҶ“гҖҠгҖӢгҖҲгҖү\r\n]/g,'');
    r=r.replace(/ж–№/g,'гҒ»гҒҶ').replace(/дёҠ/g,'гҒҶгҒҲ').replace(/дёӢ/g,'гҒ—гҒҹ');
    return r;
  },

  splitSentences(text){
    const result=[];
    const parts=text.split(/(?<=[гҖӮ])/g).filter(s=>s.trim());
    parts.forEach(p=>{
      const clean=p.replace(/[гҖӮ]/g,'').trim();
      if(!clean)return;
      result.push({text:clean,pause:250});
    });
    if(result.length===0){
      const clean=text.trim();
      if(clean)result.push({text:clean,pause:200});
    }
    return result;
  },

  speak(text,character,callback,options){
    options=options||{};
    speechSynthesis.cancel();
    clearTimeout(this.autoAdvanceTimer);
    this.speakId++;
    const myId=this.speakId;
    const cd=this.characters[character]||this.characters['гғҠгғ¬гғјгӮ·гғ§гғі'];
    const lying=options.lying||false;
    const readText=this.convertReadText(text);
    const sentences=this.splitSentences(readText);
    if(sentences.length===0){if(callback)callback();return;}
    let si=0;
    this.isSpeaking=true;
    const finish=()=>{if(myId!==this.speakId)return;this.isSpeaking=false;if(callback)callback();};
    const speakNext=()=>{
      if(myId!==this.speakId)return;
      if(si>=sentences.length){finish();return;}
      const s=sentences[si];
      const u=new SpeechSynthesisUtterance(s.text);
      if(this.selectedVoice)u.voice=this.selectedVoice;
      u.pitch=Math.min(lying?(cd.lyingPitch||cd.pitch):cd.pitch,1.2);
      u.rate=((lying?(cd.lyingRate||cd.rate):cd.rate)||1.0)*this.speechRate;
      u.volume=cd.volume||1.0;
      u.lang='ja-JP';
      u.onend=()=>{if(myId!==this.speakId)return;si++;this.autoAdvanceTimer=setTimeout(speakNext,s.pause);};
      u.onerror=()=>{if(myId!==this.speakId)return;si++;this.autoAdvanceTimer=setTimeout(speakNext,100);};
      speechSynthesis.speak(u);
    };
    speakNext();
  },

  skipCurrentSpeech(){
    if(!this.isSpeaking||this.isChoice||this.skipCooldown)return;
    this.skipCooldown=true;
    setTimeout(()=>{this.skipCooldown=false;},300);
    speechSynthesis.cancel();
    clearTimeout(this.autoAdvanceTimer);
    this.speakId++;
    this.isSpeaking=false;
  },

  silence(ms,callback){
    this.speakId++;
    const myId=this.speakId;
    this.isSpeaking=true;
    this.autoAdvanceTimer=setTimeout(()=>{
      if(myId!==this.speakId)return;
      this.isSpeaking=false;
      if(callback)callback();
    },ms);
  },

  startCountdown(seconds,onTimeout){
    const cdEl=document.getElementById('countdown-display');
    cdEl.style.display='block';
    let remaining=seconds;
    cdEl.textContent=remaining;
    this.countdownInterval=setInterval(()=>{
      remaining--;
      if(remaining>0){cdEl.textContent=remaining;}
      else{
        cdEl.textContent='0';
        clearInterval(this.countdownInterval);
        this.countdownInterval=null;
        setTimeout(()=>{cdEl.style.display='none';},500);
        if(this.isChoice){
          speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);
          this.speakId++;this.isSpeaking=false;this.isChoice=false;this.choices=null;
          document.getElementById('choice-display').innerHTML='';
          if(onTimeout)onTimeout();
        }
      }
    },1000);
  },

  stopCountdown(){
    if(this.countdownInterval){clearInterval(this.countdownInterval);this.countdownInterval=null;}
    document.getElementById('countdown-display').style.display='none';
  },

  gameOver(){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;this.choices=null;
    const te=document.getElementById('game-text');
    const ce=document.getElementById('choice-display');
    ce.innerHTML='';
    te.innerHTML='<span style="color:#ff0000;font-size:1.3em;">GAME OVER</span>';
    this.silence(2000,()=>{
      this.speak('гҒӮгҒӘгҒҹгҒҜгӮ„гҒҝгҒ«гҒ®гҒҫгӮҢгҒҹгҖӮ','гғҠгғ¬гғјгӮ·гғ§гғі',()=>{
        this.silence(2000,()=>{
          this.speak('гҒ’гғјгӮҖгҒҠгғјгҒ°гғјгҖӮгҒ“гҒ®гҒ—гӮҮгҒҶгҒ®гҒҜгҒҳгӮҒгҒӢгӮүгӮ„гӮҠгҒӘгҒҠгҒ—гҒҫгҒҷгҖӮ','гғҠгғ¬гғјгӮ·гғ§гғі',()=>{
            this.silence(2000,()=>{this.restartChapter();});
          });
        });
      });
    });
  },

  restartChapter(){
    if(this.currentChapter)this.startChapter(this.currentChapter);
    else this.returnToMenu();
  },

  save(){
    this.saveData.currentChapter=this.currentChapter;
    this.saveData.currentIndex=this.scriptIndex;
    try{localStorage.setItem('darkMysteryGame',JSON.stringify(this.saveData));}catch(e){}
  },

  loadSave(){
    try{
      const d=localStorage.getItem('darkMysteryGame');
      if(d){
        const p=JSON.parse(d);
        this.saveData.prologueCleared=p.prologueCleared||false;
        this.saveData.chaptersCleared=p.chaptersCleared||[];
        this.saveData.flags=p.flags||{};
        this.saveData.currentChapter=p.currentChapter||null;
        this.saveData.currentIndex=p.currentIndex||0;
      }
    }catch(e){}
    while(this.saveData.chaptersCleared.length<this.totalChapters)this.saveData.chaptersCleared.push(false);
  },

  clearSave(){
    this.saveData={prologueCleared:false,chaptersCleared:[],currentChapter:null,currentIndex:0,flags:{}};
    for(let i=0;i<this.totalChapters;i++)this.saveData.chaptersCleared.push(false);
    localStorage.removeItem('darkMysteryGame');
    this.updateChapterList();
  },

  showScreen(name){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;this.choices=null;
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const map={'menu':'menu-screen','option':'option-screen','prologue':'prologue-screen','game':'game-screen'};
    const el=document.getElementById(map[name]);
    if(el){el.classList.add('active');el.classList.add('fade-in');}
    this.currentScreen=name;
    document.getElementById('flick-area').style.display=name==='game'?'block':'none';
  },

  updateChapterList(){
    const list=document.getElementById('chapter-list');
    list.innerHTML='';
    for(let i=0;i<this.totalChapters;i++){
      const num=i+1;
      const title=this.getChapterTitle(num);
      const btn=document.createElement('button');
      btn.className='menu-btn chapter-btn';
      btn.textContent=title;
      let unlocked=i===0?this.saveData.prologueCleared:this.saveData.chaptersCleared[i-1];
      if(!unlocked){btn.classList.add('locked');btn.style.display='none';}
      if(this.saveData.chaptersCleared[i])btn.style.borderColor='#00cc66';
      btn.addEventListener('click',(function(n){return function(){Game.startChapter(n);};})(num));
      list.appendChild(btn);
    }
  },

  showChapterSelect(){
    document.getElementById('menu-buttons').style.display='none';
    document.getElementById('chapter-select').style.display='block';
    this.updateChapterList();
  },

  hideChapterSelect(){
    document.getElementById('menu-buttons').style.display='block';
    document.getElementById('chapter-select').style.display='none';
  },

  startPrologue(){
    this.showScreen('prologue');
    this.script=(typeof PrologueScript!=='undefined')?PrologueScript:[];
    this.scriptIndex=0;
    if(this.script.length===0){this.endPrologue();return;}
    this.runPrologueItem();
  },

  runPrologueItem(){
    if(this.scriptIndex>=this.script.length){this.endPrologue();return;}
    const item=this.script[this.scriptIndex];
    if(!item){this.endPrologue();return;}
    const ci=document.getElementById('char-image');
    const cn=document.getElementById('char-name-box');
    const sb=document.getElementById('subtitle-box');
    if(!item.character||item.character==='гғҠгғ¬гғјгӮ·гғ§гғі'){ci.style.display='none';cn.style.display='none';}
    else{
      const c=this.characters[item.character];
      if(c&&c.image){ci.src=c.image;ci.style.display='block';ci.onerror=()=>{ci.style.display='none';};}
      else ci.style.display='none';
      cn.textContent=item.character;cn.style.display='block';
    }
    sb.textContent=item.displayText||item.text||'';
    sb.style.display='block';
    const speakText=item.text||'';
    if(!speakText){this.scriptIndex++;this.runPrologueItem();return;}
    this.speak(speakText,item.character||'гғҠгғ¬гғјгӮ·гғ§гғі',()=>{
      this.autoAdvanceTimer=setTimeout(()=>{this.scriptIndex++;this.runPrologueItem();},600);
    });
  },

  tapPrologue(){
    if(this.isSpeaking){
      speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);
      this.speakId++;this.isSpeaking=false;
      this.scriptIndex++;this.runPrologueItem();
    }
  },

  endPrologue(){
    this.saveData.prologueCleared=true;this.save();
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);
    this.speakId++;this.isSpeaking=false;
    document.getElementById('char-image').style.display='none';
    document.getElementById('char-name-box').style.display='none';
    document.getElementById('subtitle-box').style.display='none';
    this.showScreen('menu');this.showChapterSelect();
  },

  startChapter(num){
    this.currentChapter=num;
    const s=this.getChapterScript(num);
    this.script=s?[...s]:[];
    this.scriptIndex=0;
    if(this.script.length===0){this.endChapter();return;}
    this.showScreen('game');this.updateFlickGuide();this.runGameItem();
  },

  updateFlickGuide(){
    const g=document.getElementById('flick-guide');
    if(this.isMobile)g.innerHTML='гӮҝгғғгғ—пјҡгӮ№гӮӯгғғгғ— пҪң гғ•гғӘгғғгӮҜпјҡйҒёжҠһиӮў<br>й•·жҠјгҒ—пјҡгғЎгғӢгғҘгғјгҒ«жҲ»гӮӢ';
    else g.innerHTML='гӮҜгғӘгғғгӮҜ/EnterпјҡгӮ№гӮӯгғғгғ— пҪң зҹўеҚ°гӮӯгғјпјҡйҒёжҠһиӮў<br>EscгӮӯгғјпјҡгғЎгғӢгғҘгғјгҒ«жҲ»гӮӢ';
  },

  findLabel(l){if(!l)return -1;const i=this.script.findIndex(s=>s&&s.label===l);if(i<0)console.error('гғ©гғҷгғ«дёҚжҳҺ:'+l);return i;},
  safeJump(l){const i=this.findLabel(l);if(i>=0)this.scriptIndex=i;else this.scriptIndex=this.script.length;},

  runGameItem(){
    if(this.scriptIndex>=this.script.length||this.scriptIndex<0){this.endChapter();return;}
    const item=this.script[this.scriptIndex];
    if(!item){this.endChapter();return;}
    if(!item.type){this.scriptIndex++;this.runGameItem();return;}
    const te=document.getElementById('game-text');
    const ce=document.getElementById('choice-display');
    switch(item.type){
      case 'text':{
        ce.innerHTML='';this.isChoice=false;this.choices=null;
        te.innerHTML=item.displayText||item.text||'';
        const speakText=item.text||'';
        if(!speakText){this.scriptIndex++;this.save();this.runGameItem();return;}
        const opts={};if(item.lying)opts.lying=true;
        this.speak(speakText,item.character||'гғҠгғ¬гғјгӮ·гғ§гғі',()=>{
          this.autoAdvanceTimer=setTimeout(()=>{this.scriptIndex++;this.save();this.runGameItem();},400);
        },opts);
        break;
      }
      case 'silence':{
        ce.innerHTML='';this.isChoice=false;this.choices=null;
        if(item.displayText)te.innerHTML=item.displayText;
        this.silence(item.duration||2000,()=>{this.scriptIndex++;this.save();this.runGameItem();});
        break;
      }
      case 'choice':{
        this.isChoice=true;this.choices=item.choices||[];
        if(this.choices.length===0){this.scriptIndex++;this.runGameItem();return;}
        te.innerHTML=item.displayText||item.text||'йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';
        let html='';const n=this.choices.length;
        const dirs=n<=2?['вҶ‘ гҒҶгҒҲ','вҶ“ гҒ—гҒҹ']:['вҶ‘ гҒҶгҒҲ','вҶ“ гҒ—гҒҹ','вҶҗ гҒІгҒ гӮҠ','вҶ’ гҒҝгҒҺ'];
        this.choices.forEach((c,i)=>{
          const label=c.displayText||c.text||('йҒёжҠһиӮў'+(i+1));
          html+='<div class="choice-item" id="choice-'+i+'">'+(dirs[i]||'')+'пјҡ'+label+'</div>';
        });
        ce.innerHTML=html;
        let rd='гҒӣгӮ“гҒҹгҒҸгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ';
        const dn=n<=2?['гҒҶгҒҲ','гҒ—гҒҹ']:['гҒҶгҒҲ','гҒ—гҒҹ','гҒІгҒ гӮҠ','гҒҝгҒҺ'];
        this.choices.forEach((c,i)=>{rd+=(dn[i]||'')+'гҖҒ'+(c.text||c.displayText||'')+'гҖӮ';});
        if(item.countdown&&item.countdown>0){
          this.speak(rd,'гғҠгғ¬гғјгӮ·гғ§гғі',()=>{
            if(!this.isChoice)return;
            this.startCountdown(item.countdown,()=>{
              if(item.timeoutJump){this.safeJump(item.timeoutJump);this.runGameItem();}
              else this.gameOver();
            });
          });
        }else this.speak(rd,'гғҠгғ¬гғјгӮ·гғ§гғі',()=>{});
        break;
      }
      case 'gameover':{this.gameOver();return;}
      case 'jump':{if(!item.target){this.scriptIndex++;this.runGameItem();return;}this.safeJump(item.target);this.runGameItem();return;}
      case 'flag':{if(item.key){this.saveData.flags[item.key]=item.value;this.save();}this.scriptIndex++;this.runGameItem();return;}
      case 'checkflag':{
        if(!item.key){this.scriptIndex++;this.runGameItem();return;}
        const val=this.saveData.flags[item.key];
        if(val===item.value){if(item.target)this.safeJump(item.target);else this.scriptIndex++;}
        else{if(item.elseTarget)this.safeJump(item.elseTarget);else this.scriptIndex++;}
        this.runGameItem();return;
      }
      case 'end':{this.endChapter();return;}
      default:{this.scriptIndex++;this.runGameItem();return;}
    }
  },

  tapGame(){
    if(this.isChoice)return;
    if(this.isSpeaking){this.skipCurrentSpeech();this.scriptIndex++;this.save();this.runGameItem();}
  },

  handleChoiceInput(dir){
    if(!this.isChoice||!this.choices)return;
    const n=this.choices.length;let ci=-1;
    if(n===2){if(dir==='up')ci=0;else if(dir==='down')ci=1;}
    else if(n===3){if(dir==='up')ci=0;else if(dir==='down')ci=1;else if(dir==='left')ci=2;}
    else if(n>=4){if(dir==='up')ci=0;else if(dir==='down')ci=1;else if(dir==='left')ci=2;else if(dir==='right')ci=3;}
    if(ci<0||ci>=n)return;
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;
    document.querySelectorAll('.choice-item').forEach(el=>el.classList.remove('highlight'));
    const el=document.getElementById('choice-'+ci);if(el)el.classList.add('highlight');
    const chosen=this.choices[ci];this.choices=null;
    setTimeout(()=>{
      document.getElementById('choice-display').innerHTML='';
      if(chosen.flag){this.saveData.flags[chosen.flag.key]=chosen.flag.value;this.save();}
      if(chosen.jump)this.safeJump(chosen.jump);else this.scriptIndex++;
      this.save();this.runGameItem();
    },300);
  },

  endChapter(){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;this.choices=null;
    if(this.currentChapter){this.saveData.chaptersCleared[this.currentChapter-1]=true;this.save();}
    this.showScreen('menu');this.showChapterSelect();
  },

  returnToMenu(){
    speechSynthesis.cancel();clearTimeout(this.autoAdvanceTimer);this.stopCountdown();
    this.speakId++;this.isSpeaking=false;this.isChoice=false;this.choices=null;
    this.showScreen('menu');
    if(this.saveData.prologueCleared)this.showChapterSelect();
    else this.hideChapterSelect();
  },

  bindEvents(){
    document.getElementById('start-btn').addEventListener('click',()=>{
      if(this.saveData.prologueCleared)this.showChapterSelect();
      else this.startPrologue();
    });
    document.getElementById('option-btn').addEventListener('click',()=>this.showScreen('option'));
    document.getElementById('option-back-btn').addEventListener('click',()=>{
      speechSynthesis.cancel();this.showScreen('menu');
      if(this.saveData.prologueCleared)this.showChapterSelect();
    });
    document.getElementById('back-menu-btn').addEventListener('click',()=>this.hideChapterSelect());
    document.getElementById('speech-speed').addEventListener('input',e=>{
      this.speechRate=parseFloat(e.target.value);
      document.getElementById('speed-val').textContent=this.speechRate.toFixed(2);
    });
    document.getElementById('test-voice-btn').addEventListener('click',()=>{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance('гҒ“гӮҢгҒҜгҒҰгҒҷгҒЁгҒҠгӮ“гҒӣгҒ„гҒ§гҒҷгҖӮгӮ„гҒҝгҒ®гҒ„гҒ–гҒӢгӮ„гҒёгӮҲгҒҶгҒ“гҒқгҖӮ');
      if(this.selectedVoice)u.voice=this.selectedVoice;
      u.pitch=0.9;u.rate=this.speechRate;u.lang='ja-JP';speechSynthesis.speak(u);
    });
    document.getElementById('clear-save-btn').addEventListener('click',()=>{
      if(confirm('гӮ»гғјгғ–гғҮгғјгӮҝгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')){this.clearSave();alert('еүҠйҷӨгҒ—гҒҫгҒ—гҒҹгҖӮ');}
    });
    document.getElementById('prologue-tap-area').addEventListener('click',()=>{
      if(this.currentScreen==='prologue')this.tapPrologue();
    });
    const fa=document.getElementById('flick-area');
    fa.addEventListener('touchstart',e=>{
      e.preventDefault();const t=e.touches[0];
      this.touchStartX=t.clientX;this.touchStartY=t.clientY;
      this.touchStartTime=Date.now();this.isLongPress=false;
      this.longPressTimer=setTimeout(()=>{this.isLongPress=true;this.returnToMenu();},1000);
    },{passive:false});
    fa.addEventListener('touchmove',e=>{
      e.preventDefault();const t=e.touches[0];
      const dx=t.clientX-this.touchStartX,dy=t.clientY-this.touchStartY;
      if(Math.sqrt(dx*dx+dy*dy)>20)clearTimeout(this.longPressTimer);
    },{passive:false});
    fa.addEventListener('touchend',e=>{
      e.preventDefault();clearTimeout(this.longPressTimer);
      if(this.isLongPress)return;if(this.currentScreen!=='game')return;
      const t=e.changedTouches[0];
      const dx=t.clientX-this.touchStartX,dy=t.clientY-this.touchStartY;
      if(Math.sqrt(dx*dx+dy*dy)>40){
        if(Math.abs(dx)>Math.abs(dy))this.handleChoiceInput(dx>0?'right':'left');
        else this.handleChoiceInput(dy>0?'down':'up');
      }else this.tapGame();
    },{passive:false});
    fa.addEventListener('click',e=>{if(this.currentScreen!=='game'||this.isMobile)return;this.tapGame();});
    document.addEventListener('keydown',e=>{
      if(this.currentScreen==='game'){
        switch(e.key){
          case'ArrowUp':e.preventDefault();this.handleChoiceInput('up');break;
          case'ArrowDown':e.preventDefault();this.handleChoiceInput('down');break;
          case'ArrowLeft':e.preventDefault();this.handleChoiceInput('left');break;
          case'ArrowRight':e.preventDefault();this.handleChoiceInput('right');break;
          case' ':case'Enter':e.preventDefault();this.tapGame();break;
          case'Escape':e.preventDefault();this.returnToMenu();break;
        }
      }else if(this.currentScreen==='prologue'){
        if(e.key===' '||e.key==='Enter'){e.preventDefault();this.tapPrologue();}
      }
    });
  }
};
window.addEventListener('DOMContentLoaded',()=>Game.init());
</script>
